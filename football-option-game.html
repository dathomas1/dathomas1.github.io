<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gridiron Strategy - 8-Zone Sequence Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: ui-sans-serif, system-ui; }
        .play-btn { transition: all 0.2s; border: 1px solid #334155; position: relative; }
        .play-btn:hover:not(:disabled) { background-color: #1e293b; border-color: #94a3b8; }
        .selected-play { border: 2px solid #fbbf24 !important; background-color: #1e293b !important; }
        
        #timeline-container { height: 6px; background: #1e293b; border-radius: 3px; position: relative; overflow: hidden; border: 1px solid #334155; }
        #timeline-progress { height: 100%; background: linear-gradient(90deg, #fbbf24, #f59e0b); width: 0%; transition: width 0.1s linear; }
        #deadline-marker { position: absolute; top: 0; width: 3px; height: 100%; background: #ef4444; box-shadow: 0 0 10px #ef4444; z-index: 10; }

        .zone-tag { font-size: 8px; padding: 1px 4px; border-radius: 3px; background: #334155; color: #94a3b8; margin-right: 2px; text-transform: uppercase; }
        .option-highlight { color: #fbbf24; text-shadow: 0 0 10px rgba(251, 191, 36, 0.4); }
        .rating-input { background: #0f172a; border: 1px solid #334155; color: #fbbf24; text-align: center; width: 35px; border-radius: 4px; font-weight: 800; }
        
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .danger-pulse { animation: pulse-red 1s infinite; color: #ef4444; }
    </style>
</head>
<body class="flex flex-col items-center p-4 min-h-screen">

    <!-- Header Stats -->
    <div class="w-full max-w-6xl bg-slate-900 p-4 rounded-lg border border-slate-700 mb-4 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-4">
            <div class="p-2 bg-amber-500/10 rounded-lg border border-amber-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </div>
            <div>
                <h1 class="text-xl font-black italic tracking-tighter uppercase leading-none">Gridiron <span class="text-amber-500">Chess</span></h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1" id="possession-ui">1st & 10 | Own 25</p>
            </div>
        </div>
        <div id="game-clock" class="text-2xl font-mono font-bold text-amber-400">HOME 0 - 0 AWAY</div>
    </div>

    <!-- Main Visualizer -->
    <div id="simulation-viewport" class="w-full max-w-6xl aspect-[21/9] md:aspect-video bg-slate-950 border-2 border-slate-800 rounded-xl relative flex flex-col items-center justify-center p-8 shadow-2xl overflow-hidden">
        <div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 40px 40px;"></div>
        
        <div id="sim-content" class="text-center z-10">
            <div id="sim-main-text" class="text-3xl md:text-5xl font-black italic uppercase tracking-tighter text-slate-700 transition-all duration-300">Ready for Call</div>
            <div id="sim-sub-text" class="text-sm md:text-base font-mono text-slate-500 mt-4 uppercase tracking-widest h-6">Choose a formation and play</div>
        </div>
        
        <!-- Sequence Timeline -->
        <div id="sim-timeline-box" class="absolute bottom-12 w-3/4 opacity-0 transition-all duration-500 transform translate-y-4">
            <div class="flex justify-between text-[10px] font-black text-slate-500 mb-2 uppercase tracking-widest">
                <span>Snap</span><span>Beat 1</span><span>Beat 2</span><span>Beat 3</span><span>Finish</span>
            </div>
            <div id="timeline-container">
                <div id="timeline-progress"></div>
                <div id="deadline-marker"></div>
            </div>
            <div class="flex justify-between mt-2">
                <div class="text-[9px] text-amber-500 font-bold uppercase" id="read-status">Read Status: Idle</div>
                <div class="text-[9px] text-red-500 font-black uppercase flex items-center gap-1" id="deadline-text">
                    <span class="w-2 h-2 bg-red-500 rounded-full animate-ping"></span> Pocket Deadline
                </div>
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="w-full max-w-6xl mt-4 grid grid-cols-1 lg:grid-cols-4 gap-4">
        <!-- Personnel Selection -->
        <div class="bg-slate-800 p-4 rounded-lg border border-slate-700 shadow-lg">
            <p class="text-[10px] uppercase text-slate-500 mb-3 font-black tracking-widest border-b border-slate-700 pb-2">1. Personnel Package</p>
            <div class="flex flex-col gap-2">
                <button onclick="setPersonnel('heavy')" id="btn-heavy" class="personnel-btn text-[11px] p-3 bg-slate-700 rounded-md font-bold text-left hover:bg-slate-600 transition-colors">22 PERSONNEL (I-FORM)</button>
                <button onclick="setPersonnel('balanced')" id="btn-balanced" class="personnel-btn text-[11px] p-3 bg-slate-700 rounded-md font-bold text-left hover:bg-slate-600 transition-colors">11 PERSONNEL (SINGLEBACK)</button>
                <button onclick="setPersonnel('pass')" id="btn-pass" class="personnel-btn text-[11px] p-3 bg-slate-700 rounded-md font-bold text-left hover:bg-slate-600 transition-colors">10 PERSONNEL (SPREAD)</button>
            </div>
        </div>

        <!-- Playbook -->
        <div class="lg:col-span-3 bg-slate-800 p-4 rounded-lg border border-slate-700 shadow-lg relative">
            <div class="flex justify-between items-center mb-3 border-b border-slate-700 pb-2">
                <p class="text-[10px] uppercase text-slate-500 font-black tracking-widest">2. 8-Zone Tactical Playbook</p>
                <button id="snap-btn" onclick="snapBall()" class="hidden bg-emerald-600 hover:bg-emerald-500 text-white text-xs px-8 py-2 rounded-md font-black italic tracking-widest transition-all shadow-lg shadow-emerald-900/40 transform hover:-translate-y-1 active:translate-y-0">SNAP BALL</button>
            </div>
            <div id="play-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3">
                <!-- Plays populated by JS -->
            </div>
        </div>
    </div>

    <!-- Roster / Editor -->
    <div class="w-full max-w-6xl mt-6 bg-slate-900 border border-slate-700 rounded-lg p-6 shadow-xl mb-12">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
            <div>
                <h4 class="text-[10px] font-black text-blue-400 uppercase mb-4 tracking-[0.2em] flex items-center gap-2">
                    <span class="w-4 h-[2px] bg-blue-500"></span> Offensive Awareness
                </h4>
                <div id="roster-offense" class="grid grid-cols-1 gap-2"></div>
            </div>
            <div>
                <h4 class="text-[10px] font-black text-red-400 uppercase mb-4 tracking-[0.2em] flex items-center gap-2">
                    <span class="w-4 h-[2px] bg-red-500"></span> Defensive Pressure & Scheme
                </h4>
                <div id="roster-defense" class="grid grid-cols-1 gap-2"></div>
            </div>
        </div>
    </div>

    <script>
        const playDefinitions = {
            triple_option: {
                name: "Triple Option", type: "option", formation: ["heavy", "balanced"],
                sequence: [
                    { beat: 1, readZone: "Interior", onVacated: "fb_dive", onOccupied: "continue" },
                    { beat: 2, readZone: "Edge", onVacated: "qb_keep", onOccupied: "pitch_rb" }
                ],
                branches: {
                    fb_dive: { name: "FB Dive", finishZone: "Interior", range: [3, 5], success: 65 },
                    qb_keep: { name: "QB Keeper", finishZone: "Edge", range: [4, 12], success: 50 },
                    pitch_rb: { name: "Pitch Out", finishZone: "Wide Alley", range: [0, 25], success: 40 }
                }
            },
            rpo_slant: {
                name: "RPO Slant", type: "rpo", formation: ["balanced", "pass"],
                sequence: [
                    { beat: 1, readZone: "Hook/Curl", onVacated: "slant_pass", onOccupied: "inside_zone" }
                ],
                branches: {
                    slant_pass: { name: "Slant Pass", finishZone: "Hook/Curl", range: [7, 13], success: 62 },
                    inside_zone: { name: "Inside Zone", finishZone: "Interior", range: [2, 6], success: 55 }
                }
            },
            smash: {
                name: "Smash Concept", type: "pass", formation: ["pass"],
                sequence: [
                    { beat: 1, readZone: "Deep Flank", onVacated: "corner_route", onOccupied: "hitch_out" }
                ],
                branches: {
                    corner_route: { name: "Corner Route", finishZone: "Deep Flank", range: [12, 22], success: 45 },
                    hitch_out: { name: "Hitch Route", finishZone: "Out", range: [4, 8], success: 70 }
                }
            },
            quarters_beater: {
                name: "Seam Vertical", type: "pass", formation: ["pass"],
                sequence: [
                    { beat: 1, readZone: "Seam", onVacated: "seam_shot", onOccupied: "flare_out" }
                ],
                branches: {
                    seam_shot: { name: "Seam Vertical", finishZone: "Seam", range: [15, 30], success: 38 },
                    flare_out: { name: "Flare Checkdown", finishZone: "Out", range: [2, 7], success: 75 }
                }
            }
        };

        const roster = {
            offense: { "QB IQ": 4, "Ball Carrier": 3, "O-Line": 3 },
            defense: { "Pass Rush": 4, "Coverage IQ": 3, "Scheme Disguise": 3 }
        };

        // Mapping Defense Focus to Zone Occupancy (Simulation Logic)
        const defenseStateMaps = {
            'run': ['Interior', 'Edge', 'Wide Alley', 'Hook/Curl'],
            'pass': ['Hook/Curl', 'Seam', 'Deep Flank', 'Deep Post'],
            'quarters': ['Interior', 'Edge', 'Seam', 'Deep Flank', 'Deep Post'] // Note: 'Out' and 'Wide Alley' are Vacated
        };

        let state = { fieldPos: 25, score: 0, currentPersonnel: 'balanced', selectedPlay: null, defFocus: 'run', isSimulating: false };

        function setPersonnel(type) {
            state.currentPersonnel = type;
            document.querySelectorAll('.personnel-btn').forEach(b => b.classList.remove('bg-amber-600', 'text-white'));
            document.getElementById(`btn-${type}`).classList.add('bg-amber-600', 'text-white');
            
            const grid = document.getElementById('play-grid'); grid.innerHTML = '';
            Object.values(playDefinitions).filter(p => p.formation.includes(type)).forEach(play => {
                const btn = document.createElement('button');
                btn.className = `play-btn p-3 rounded-lg text-left bg-slate-700 border border-slate-600 shadow-sm flex flex-col gap-1`;
                const zones = [...new Set(play.sequence.map(s => s.readZone))];
                btn.innerHTML = `
                    <span class="text-xs font-black uppercase text-white">${play.name}</span>
                    <div class="flex flex-wrap mt-1">${zones.map(z => `<span class="zone-tag">${z}</span>`).join('')}</div>
                `;
                btn.onclick = () => { 
                    if (state.isSimulating) return;
                    state.selectedPlay = play; 
                    document.querySelectorAll('.play-btn').forEach(b => b.classList.remove('selected-play'));
                    btn.classList.add('selected-play');
                    updateUI(); 
                };
                grid.appendChild(btn);
            });
            updateUI();
        }

        async function snapBall() {
            if (state.isSimulating) return;
            state.isSimulating = true;
            const play = state.selectedPlay;
            const mainText = document.getElementById('sim-main-text');
            const subText = document.getElementById('sim-sub-text');
            const timelineBox = document.getElementById('sim-timeline-box');
            const progress = document.getElementById('timeline-progress');
            const deadlineMarker = document.getElementById('deadline-marker');
            const readStatus = document.getElementById('read-status');
            
            // 1. INITIALIZE ENVIRONMENT
            const pocketDeadline = Math.max(1.5, 2.5 + ((roster.offense["O-Line"] - roster.defense["Pass Rush"]) * 0.4));
            deadlineMarker.style.left = `${(pocketDeadline / 4) * 100}%`;
            timelineBox.style.opacity = "1";
            timelineBox.style.transform = "translateY(0)";
            progress.style.width = "0%";
            
            // Randomly pick a defensive shell for this snap
            const shells = ['run', 'pass', 'quarters'];
            const activeShell = shells[Math.floor(Math.random() * shells.length)];
            const occupiedZones = defenseStateMaps[activeShell];

            let currentBeat = 0;
            let finalBranch = null;
            let isSacked = false;

            // 2. SEQUENCE LOOP
            for (const step of play.sequence) {
                mainText.innerText = `READING ${step.readZone}`;
                mainText.className = "text-3xl md:text-5xl font-black italic uppercase tracking-tighter text-amber-500 animate-pulse";
                readStatus.innerText = `READ STATUS: PROCESSING ${step.readZone}...`;

                // Calculate Latency (QB Awareness determines how fast they scan)
                const readLatency = Math.max(0.4, 1.3 - (roster.offense["QB IQ"] * 0.18));
                const processingTime = 1000 * readLatency;

                // Animate progress bar to the end of this read
                const startWidth = (currentBeat / 4) * 100;
                const endWidth = ((currentBeat + readLatency) / 4) * 100;
                progress.style.width = `${endWidth}%`;

                await new Promise(r => setTimeout(r, processingTime));
                currentBeat += readLatency;

                // TRENCH COLLAPSE CHECK
                if (currentBeat > pocketDeadline) {
                    isSacked = true;
                    break;
                }

                // DETERMINE PATHWAY BASED ON 8-ZONE MAP
                const isVacated = !occupiedZones.includes(step.readZone);
                const decision = isVacated ? step.onVacated : step.onOccupied;

                if (decision === "continue") {
                    subText.innerText = `Defender is sitting in ${step.readZone}. Going to next read...`;
                } else {
                    finalBranch = play.branches[decision];
                    subText.innerText = isVacated 
                        ? `ZONE VACATED! Targetting ${finalBranch.name}...` 
                        : `Zone Occupied. Dumping to ${finalBranch.name}.`;
                    break;
                }
            }

            // 3. RESOLUTION
            progress.style.width = "100%";
            mainText.classList.remove('animate-pulse');

            if (isSacked) {
                mainText.innerText = "SACKED";
                mainText.className = "text-4xl md:text-6xl font-black italic uppercase text-red-600 danger-pulse";
                subText.innerText = `Pressure from ${activeShell.toUpperCase()} shell too fast for QB IQ.`;
                state.fieldPos = Math.max(1, state.fieldPos - 6);
            } else {
                const branch = finalBranch || Object.values(play.branches)[0];
                const gain = Math.floor(Math.random() * (branch.range[1] - branch.range[0] + 1) + branch.range[0]);
                
                mainText.innerText = `+${gain} YARDS`;
                mainText.className = "text-4xl md:text-6xl font-black italic uppercase text-emerald-500 option-highlight";
                subText.innerText = `${branch.name} successful vs ${activeShell.toUpperCase()} shell.`;
                state.fieldPos += gain;
                if (state.fieldPos >= 100) { state.score += 7; state.fieldPos = 25; }
            }

            updateUI();
            
            setTimeout(() => {
                timelineBox.style.opacity = "0";
                timelineBox.style.transform = "translateY(10px)";
                state.selectedPlay = null;
                state.isSimulating = false;
                document.querySelectorAll('.play-btn').forEach(b => b.classList.remove('selected-play'));
                updateUI();
            }, 4000);
        }

        function updateUI() {
            document.getElementById('snap-btn').classList.toggle('hidden', !state.selectedPlay || state.isSimulating);
            document.getElementById('possession-ui').innerText = `POSSESSION: YD ${state.fieldPos} | ${state.currentPersonnel.toUpperCase()}`;
            document.getElementById('game-clock').innerText = `HOME ${state.score} - 0 AWAY`;
            
            if (!state.isSimulating) {
                document.getElementById('sim-main-text').innerText = state.selectedPlay ? "PRE-SNAP" : "CHOOSE PLAY";
                document.getElementById('sim-main-text').className = "text-3xl md:text-5xl font-black italic uppercase tracking-tighter text-slate-700";
                document.getElementById('sim-sub-text').innerText = state.selectedPlay ? `PLAY: ${state.selectedPlay.name}` : "Awaiting playcall from sideline...";
            }
        }

        function initRoster() {
            const off = document.getElementById('roster-offense');
            const def = document.getElementById('roster-defense');
            [off, def].forEach(el => el.innerHTML = '');
            
            Object.entries(roster.offense).forEach(([pos, val]) => {
                off.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-800/50 p-3 rounded-md border border-slate-700/50">
                        <span class="text-[11px] uppercase font-black text-slate-300">${pos}</span>
                        <input type="number" min="1" max="5" value="${val}" class="rating-input" onchange="roster.offense['${pos}'] = parseInt(this.value)">
                    </div>`;
            });
            Object.entries(roster.defense).forEach(([pos, val]) => {
                def.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-800/50 p-3 rounded-md border border-slate-700/50">
                        <span class="text-[11px] uppercase font-black text-slate-300">${pos}</span>
                        <input type="number" min="1" max="5" value="${val}" class="rating-input" onchange="roster.defense['${pos}'] = parseInt(this.value)">
                    </div>`;
            });
        }

        initRoster();
        setPersonnel('balanced');
    </script>
</body>
</html>
