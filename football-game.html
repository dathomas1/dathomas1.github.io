<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gridiron Strategy MVP - Tactical Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: ui-sans-serif, system-ui; overflow-x: hidden; }
        canvas { 
            border: 2px solid #334155; 
            border-radius: 8px; 
            background-color: #064e3b; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%; /* Responsive width */
            height: auto;
        }
        .play-btn { transition: all 0.2s; border: 1px solid #475569; position: relative; }
        .play-btn:hover:not(:disabled) { transform: scale(1.02); background-color: #1e293b; border-color: #94a3b8; }
        .play-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .selected-play { border: 2px solid #fbbf24 !important; background-color: #1e293b !important; }
        
        .danger-badge { 
            position: absolute; top: -8px; right: -8px; 
            padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 900;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 10;
        }
        .exposed-badge {
            position: absolute; top: -8px; left: -8px; 
            padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 900;
            background-color: #10b981; color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 10;
        }
        
        #play-log-panel {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100%;
            background-color: #1e293b; border-left: 2px solid #334155;
            transition: right 0.3s ease-in-out; z-index: 100;
            display: flex; flex-direction: column;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }
        #play-log-panel.open { right: 0; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        .result-highlight { color: #10b981; text-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
        
        /* Loading Animation */
        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }
    </style>
</head>
<body class="flex flex-col items-center p-4 min-h-screen">

    <!-- Play Log -->
    <div id="play-log-panel">
        <div class="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-900">
            <h2 class="font-black italic text-amber-500 tracking-widest uppercase">Game Log</h2>
            <button onclick="toggleLog()" class="text-slate-400 hover:text-white p-2">✕</button>
        </div>
        <div id="log-content" class="overflow-y-auto flex-grow custom-scrollbar">
            <div class="p-8 text-center text-slate-500 italic text-sm">No plays recorded yet.</div>
        </div>
    </div>

    <!-- Header / Scoreboard -->
    <div class="w-full max-w-6xl flex flex-col md:flex-row justify-between items-center md:items-end mb-4 bg-slate-900 p-4 rounded-lg border border-slate-700 gap-4">
        <div class="flex items-center gap-4 w-full md:w-auto">
            <div>
                <h1 class="text-xl md:text-2xl font-black italic tracking-tighter text-slate-100 uppercase">Strategy <span class="text-amber-500 text-sm md:text-lg">Tactical Engine</span></h1>
                <p class="text-[10px] md:text-xs text-slate-400 uppercase font-bold" id="possession-ui">Possession 1 of 4</p>
            </div>
            <button onclick="toggleLog()" class="bg-slate-800 border border-slate-600 px-3 py-1 rounded text-[10px] font-black uppercase text-amber-500 hover:bg-slate-700 transition-colors ml-auto md:ml-0">
                Log
            </button>
        </div>
        <div class="text-center md:text-right w-full md:w-auto border-t md:border-t-0 border-slate-800 pt-2 md:pt-0">
            <p class="text-2xl md:text-3xl font-mono font-bold text-amber-400" id="score-ui">HOME 0 - 0 AWAY</p>
            <p class="text-xs md:text-sm font-bold text-slate-300" id="down-distance-ui">1st & 10 at Own 25</p>
        </div>
    </div>

    <!-- Field Area -->
    <div class="relative w-full max-w-6xl">
        <canvas id="gameCanvas"></canvas>
        
        <!-- Overlays -->
        <div id="pre-snap-overlay" class="hidden absolute inset-0 flex items-center justify-center pointer-events-none">
            <div class="bg-amber-500/20 border border-amber-500/50 backdrop-blur-sm px-6 py-2 rounded-full text-amber-400 font-black italic animate-pulse text-sm md:text-base">
                PRE-SNAP: AUDIBLE OR SNAP
            </div>
        </div>
        <div id="calculating-overlay" class="hidden absolute inset-0 flex items-center justify-center bg-slate-900/40 backdrop-blur-[2px] rounded-lg">
            <div class="flex flex-col items-center">
                <div class="w-12 h-12 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <div class="text-amber-400 font-black italic tracking-widest uppercase">Simulating Play</div>
            </div>
        </div>
    </div>

    <!-- Intel Bar -->
    <div id="intel-bar" class="w-full max-w-6xl mt-2 min-h-[60px] py-2 px-4 flex flex-col items-center justify-center border border-slate-700 bg-slate-900/80 rounded transition-all duration-300">
        <div id="intel-main" class="text-[11px] md:text-[13px] font-black text-amber-500 uppercase tracking-widest text-center">CHOOSE FORMATION AND PLAY</div>
        <div id="intel-sub" class="text-[9px] md:text-[11px] text-slate-400 font-mono mt-1 text-center opacity-80"></div>
    </div>

    <!-- Controls -->
    <div class="w-full max-w-6xl mt-4 grid grid-cols-1 lg:grid-cols-4 gap-4">
        <!-- Formation List -->
        <div class="bg-slate-800 p-3 rounded border border-slate-700 h-fit">
            <p class="text-[10px] uppercase text-slate-500 mb-2 font-bold tracking-widest">1. Personnel</p>
            <div id="personnel-list" class="flex flex-row lg:flex-col gap-2 overflow-x-auto pb-1 lg:pb-0">
                <button onclick="setPersonnel('run')" id="btn-run" class="flex-1 text-[10px] p-2 bg-slate-700 rounded font-bold border-l-4 border-emerald-500 text-left whitespace-nowrap">I-FORM (HEAVY)</button>
                <button onclick="setPersonnel('balanced')" id="btn-balanced" class="flex-1 text-[10px] p-2 bg-slate-700 rounded font-bold text-left whitespace-nowrap">SINGLEBACK (BAL)</button>
                <button onclick="setPersonnel('pass')" id="btn-pass" class="flex-1 text-[10px] p-2 bg-slate-700 rounded font-bold text-left whitespace-nowrap">SHOTGUN (SPREAD)</button>
            </div>
        </div>

        <!-- Playbook Grid -->
        <div class="lg:col-span-3 bg-slate-800 p-3 rounded border border-slate-700 relative">
            <div class="flex justify-between items-center mb-2">
                <p class="text-[10px] uppercase text-slate-500 font-bold tracking-widest">2. Playcall & Audibles</p>
                <button id="snap-btn" onclick="snapBall()" class="hidden bg-emerald-600 hover:bg-emerald-500 text-white text-[10px] px-6 py-2 rounded font-black italic tracking-widest transition-all transform hover:scale-105 active:scale-95 shadow-lg shadow-emerald-900/20">
                    SNAP BALL
                </button>
            </div>
            <div id="play-grid" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-2">
                <!-- Plays generated via JS -->
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Team and Play Data
        const team = {
            offense: { QB: 82, RBs: 78, OL: 81, TE: 75, WR: 84 },
            defense: { DL: 79, LBs: 82, CB: 78, Safety: 85, score: 0, archetype: 'balanced' }
        };

        const offensivePlays = [
            { id: 'inside_zone', name: 'Inside Zone', formation: ['run', 'balanced'], tags: ['inside_run'], range: [3, 5], success: 52 },
            { id: 'power_o', name: 'Power O', formation: ['run'], tags: ['off_tackle'], range: [2, 6], success: 48 },
            { id: 'toss', name: 'Pitch Toss', formation: ['run', 'balanced'], tags: ['outside_run'], range: [-1, 12], success: 40 },
            { id: 'draw', name: 'HB Draw', formation: ['pass'], tags: ['inside_run', 'delayed'], range: [2, 12], success: 50 },
            { id: 'counter', name: 'Counter Lead', formation: ['run', 'balanced'], tags: ['off_tackle', 'misdirection'], range: [2, 10], success: 45 },
            { id: 'slant', name: 'Quick Slants', formation: ['balanced', 'pass'], tags: ['quick_pass'], range: [4, 8], success: 65 },
            { id: 'verts', name: 'Four Verts', formation: ['pass'], tags: ['deep_pass'], range: [12, 40], success: 38 },
            { id: 'deep_pa', name: 'Deep Playaction', formation: ['run'], tags: ['deep_pass', 'playaction'], range: [15, 45], success: 35 },
            { id: 'screen', name: 'HB Screen', formation: ['balanced', 'pass', 'run'], tags: ['quick_pass', 'delayed'], range: [-2, 15], success: 45 },
            { id: 'rpo', name: 'RPO Slant', formation: ['balanced', 'pass'], tags: ['inside_run', 'quick_pass'], range: [3, 10], success: 55, isOption: true },
            { id: 'zone_read', name: 'Zone Read', formation: ['pass'], tags: ['inside_run', 'off_tackle'], range: [4, 12], success: 50, isOption: true }
        ];

        const TagConflictMap = {
            'inside_run':  { exposes: ['playaction', 'outside_run'], logic: "LBs biting on run" },
            'deep_pass':   { exposes: ['delayed', 'inside_run'], logic: "Safeties backpedaling" },
            'quick_pass':  { exposes: ['deep_pass'], logic: "CBs playing tight" },
            'outside_run': { exposes: ['counter', 'inside_run'], logic: "Over-pursuit" }
        };

        const defensivePlays = [
            { id: 'c1', name: 'Cover 1', shell: '1-high', ssPos: 'box', focus: ['inside_run', 'off_tackle'] },
            { id: 'c3', name: 'Cover 3', shell: '1-high', ssPos: 'box', focus: ['inside_run', 'quick_pass'] },
            { id: 'c2', name: 'Cover 2', shell: '2-high', ssPos: 'high', focus: ['quick_pass'] },
            { id: 'q', name: 'Quarters', shell: '2-high', ssPos: 'high', focus: ['deep_pass'] }
        ];

        let state = {
            possession: 1, score: 0, fieldPos: 25, down: 1, distance: 10,
            currentPersonnel: 'balanced', selectedPlay: null, cpuDefPlay: null,
            phase: 'personnel', lastResult: 'SELECT FORMATION AND PLAY', 
            lastTechnical: '', playHistory: [], tagExperience: {},
            isCalculating: false
        };

        // UI Management
        function toggleLog() { document.getElementById('play-log-panel').classList.toggle('open'); }

        function updateLogUI() {
            const container = document.getElementById('log-content');
            if (state.playHistory.length === 0) return;
            container.innerHTML = state.playHistory.map((h, i) => `
                <div class="log-entry p-3 border-b border-slate-700/50 text-[10px]">
                    <div class="flex justify-between mb-1">
                        <span class="text-amber-500 font-black">#${i + 1} | ${h.down}&${h.distance}</span>
                        <span class="text-slate-400 font-mono">BALL ON ${h.fieldPos}</span>
                    </div>
                    <div class="flex gap-2">
                        <div class="flex-1 bg-slate-900/30 p-1 rounded">
                            <p class="text-[8px] text-slate-500 uppercase font-bold">OFFENSE</p>
                            <p class="text-white truncate">${offensivePlays.find(p => p.id === h.playId)?.name}</p>
                        </div>
                        <div class="flex-1 bg-slate-900/30 p-1 rounded">
                            <p class="text-[8px] text-slate-500 uppercase font-bold">DEFENSE</p>
                            <p class="text-red-400 truncate">${h.defPlayName}</p>
                        </div>
                    </div>
                    <div class="mt-2 text-emerald-400 font-bold italic border-l-2 border-emerald-500 pl-2">RESULT: ${h.outcomeText}</div>
                </div>
            `).reverse().join('');
        }

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth * window.devicePixelRatio;
            canvas.height = (container.clientWidth * 0.46) * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function getExperience(tag) { return state.tagExperience[tag] || 0; }

        function getAnticipationLevel(tags) {
            const maxExp = Math.max(...tags.map(t => getExperience(t)));
            if (maxExp >= 3) return 3; 
            if (maxExp >= 1.5) return 2;
            return 0;
        }

        function setPersonnel(type) {
            if (state.phase === 'results' || state.isCalculating) return;
            state.currentPersonnel = type;
            state.phase = 'personnel';
            state.cpuDefPlay = null; state.selectedPlay = null;
            
            ['run', 'balanced', 'pass'].forEach(t => {
                const btn = document.getElementById(`btn-${t}`);
                btn.classList.toggle('border-l-4', t === type);
                btn.classList.toggle('border-emerald-500', t === type);
            });
            
            document.getElementById('snap-btn').classList.add('hidden');
            document.getElementById('pre-snap-overlay').classList.add('hidden');
            renderPlaybook();
            updateUI();
        }

        function renderPlaybook() {
            const grid = document.getElementById('play-grid');
            grid.innerHTML = '';

            offensivePlays.filter(p => p.formation.includes(state.currentPersonnel)).forEach(play => {
                let finalSucc = play.success;
                let isExposed = false;

                Object.keys(state.tagExperience).forEach(tag => {
                    if (getExperience(tag) >= 2 && TagConflictMap[tag]?.exposes.some(et => play.tags.includes(et))) {
                        isExposed = true;
                    }
                });

                if (isExposed) finalSucc += 20;
                else {
                    const danger = getAnticipationLevel(play.tags);
                    if (danger >= 2) finalSucc -= (danger * 12);
                }

                const btn = document.createElement('button');
                btn.className = `play-btn flex flex-col items-start p-2 bg-slate-700 rounded font-bold uppercase border ${state.selectedPlay?.id === play.id ? 'selected-play' : 'border-slate-600'}`;
                btn.disabled = state.isCalculating;

                if (isExposed) btn.innerHTML += `<div class="exposed-badge">EXPOSED</div>`;
                else {
                    const danger = getAnticipationLevel(play.tags);
                    if (danger >= 2) {
                        const color = danger === 3 ? 'bg-red-600' : 'bg-orange-500';
                        btn.innerHTML += `<div class="danger-badge ${color} text-white">${danger === 3 ? 'READ' : 'WATCH'}</div>`;
                    }
                }

                btn.innerHTML += `
                    <span class="text-[9px] md:text-[10px] text-white truncate w-full text-left">${play.name}</span>
                    <div class="flex justify-between w-full mt-1 items-center">
                        <span class="text-[8px] text-slate-400 font-mono">${play.range[0]}-${play.range[1]}Y</span>
                        <span class="text-[8px] font-black ${finalSucc > play.success ? 'text-emerald-400' : (finalSucc < play.success ? 'text-red-400' : 'text-slate-300')}">${finalSucc}%</span>
                    </div>
                `;
                btn.onclick = () => selectPlay(play);
                grid.appendChild(btn);
            });
        }

        function selectPlay(play) {
            if (state.phase === 'results' || state.isCalculating) return;
            const isAudible = state.phase === 'pre-snap';
            state.selectedPlay = play;
            
            if (!isAudible) {
                let pool = [];
                defensivePlays.forEach(dp => {
                    let w = 1;
                    if (state.currentPersonnel === 'run' && dp.shell === '1-high') w = 5;
                    if (state.currentPersonnel === 'pass' && dp.shell === '2-high') w = 5;
                    for(let i=0; i<w; i++) pool.push(dp);
                });
                state.cpuDefPlay = pool[Math.floor(Math.random() * pool.length)];
                state.phase = 'pre-snap';
                document.getElementById('snap-btn').classList.remove('hidden');
                document.getElementById('pre-snap-overlay').classList.remove('hidden');
            }
            
            state.lastResult = isAudible ? `AUDIBLE: ${play.name}` : `READING DEFENSE: ${state.cpuDefPlay.shell.toUpperCase()}`;
            state.lastTechnical = ""; 
            renderPlaybook();
            updateUI();
        }

        async function snapBall() {
            if (state.phase !== 'pre-snap' || state.isCalculating) return;
            
            // Set Loading State
            state.isCalculating = true;
            document.getElementById('snap-btn').classList.add('hidden');
            document.getElementById('pre-snap-overlay').classList.add('hidden');
            document.getElementById('calculating-overlay').classList.remove('hidden');
            renderPlaybook();
            updateUI();

            // Simulate "Calculation" delay
            await new Promise(resolve => setTimeout(resolve, 800 + Math.random() * 800));

            state.isCalculating = false;
            state.phase = 'results';
            document.getElementById('calculating-overlay').classList.add('hidden');
            
            const play = state.selectedPlay;
            const cpu = state.cpuDefPlay;
            let finalSuccess = play.success;
            let intelMsg = "";
            let schemeFooled = false;
            let techDetails = `BASE: ${play.success}`;

            Object.keys(state.tagExperience).forEach(tag => {
                if (getExperience(tag) >= 2 && TagConflictMap[tag]?.exposes.some(et => play.tags.includes(et))) {
                    finalSuccess += 20;
                    schemeFooled = true;
                    techDetails += " +20 EXPOSED";
                }
            });

            if (!schemeFooled && play.isOption && play.tags.length >= 2) {
                const exp1 = getExperience(play.tags[0]);
                const exp2 = getExperience(play.tags[1]);
                if (Math.abs(exp1 - exp2) > 1) {
                    finalSuccess += 15;
                    schemeFooled = true;
                    techDetails += " +15 OPTION";
                }
            }

            if (!schemeFooled) {
                const danger = getAnticipationLevel(play.tags);
                if (danger >= 2) {
                    const penalty = danger * 12;
                    finalSuccess -= penalty;
                    techDetails += ` -${penalty} ${danger === 3 ? 'READ' : 'WATCH'}`;
                }
            }

            const roll = Math.floor(Math.random() * 100);
            let gain = 0; let outcomeText = ""; let isTurnover = false;
            const isPass = play.tags.includes('quick_pass') || play.tags.includes('deep_pass');

            state.lastTechnical = `[ROLL: ${roll} | NEED < ${finalSuccess}] (${techDetails})`;

            if (roll < finalSuccess) {
                gain = Math.floor(Math.random() * (play.range[1] - play.range[0] + 1)) + play.range[0];
                outcomeText = `GAINED ${gain}Y`;
                if (schemeFooled) intelMsg = "DEFENSE FOOLED! ";
            } else {
                if (roll > 96) { 
                    isTurnover = true; outcomeText = "TURNOVER!"; 
                } else {
                    if (isPass) { gain = 0; outcomeText = "INCOMPLETE"; }
                    else { gain = Math.floor(Math.random() * 3) - 1; outcomeText = `STUFFED (${gain}Y)`; }
                    if (schemeFooled) intelMsg = "SCHEME BEAT DEFENSE, BUT FAILED TO CAPITALIZE. ";
                }
            }

            play.tags.forEach(t => state.tagExperience[t] = (state.tagExperience[t] || 0) + 1.0);

            state.playHistory.push({
                playId: play.id, down: state.down, distance: state.distance, fieldPos: state.fieldPos,
                personnel: state.currentPersonnel, defPlayName: cpu.name, outcomeText, gain: isTurnover ? -20 : gain,
                technical: state.lastTechnical
            });
            
            updateLogUI();
            state.lastResult = intelMsg + outcomeText;
            
            if (isTurnover) { team.defense.score += 3; setTimeout(endPossession, 3000); }
            else {
                state.fieldPos += gain;
                if (state.fieldPos >= 100) { state.score += 7; setTimeout(endPossession, 3000); }
                else updateDowns(gain);
            }
            
            updateUI();
            
            setTimeout(() => {
                if (state.phase === 'results') {
                    state.phase = 'personnel'; 
                    state.selectedPlay = null; 
                    state.cpuDefPlay = null;
                    renderPlaybook(); 
                    updateUI();
                }
            }, 3000);
        }

        function updateDowns(gain) {
            state.distance -= gain;
            if (state.distance <= 0) { state.down = 1; state.distance = 10; }
            else { state.down++; if (state.down > 4) endPossession(); }
        }

        function endPossession() {
            state.possession++; state.fieldPos = 25; state.down = 1; state.distance = 10;
            state.phase = 'personnel'; state.selectedPlay = null; state.cpuDefPlay = null;
            Object.keys(state.tagExperience).forEach(tag => state.tagExperience[tag] *= 0.7);
            renderPlaybook(); updateUI();
        }

        function updateUI() {
            document.getElementById('score-ui').innerText = `HOME ${state.score} - ${team.defense.score} AWAY`;
            document.getElementById('possession-ui').innerText = `Possession ${Math.min(state.possession, 4)} of 4`;
            document.getElementById('down-distance-ui').innerText = `${state.down} & ${state.distance} at YD ${state.fieldPos}`;
            
            const main = document.getElementById('intel-main');
            const sub = document.getElementById('intel-sub');
            
            if (state.isCalculating) {
                main.innerHTML = `<span class="loading-dots">SIMULATING PLAY</span>`;
                sub.innerText = "Processing strategic probabilities...";
                main.classList.remove('result-highlight');
            } else {
                main.innerText = state.lastResult;
                sub.innerText = state.lastTechnical;
                if (state.phase === 'results') main.classList.add('result-highlight');
                else main.classList.remove('result-highlight');
            }
        }

        function drawPlayer(x, y, color, isSquare) {
            ctx.fillStyle = color;
            const s = canvas.width / 120; // Scale player size
            if (isSquare) ctx.fillRect(x - s, y - s, s*2, s*2);
            else { ctx.beginPath(); ctx.arc(x, y, s, 0, Math.PI * 2); ctx.fill(); }
        }

        function draw() {
            // Field dimensions relative to current width
            const w = canvas.width / window.devicePixelRatio;
            const h = canvas.height / window.devicePixelRatio;
            
            ctx.clearRect(0, 0, w, h);
            
            // Draw Grid
            ctx.strokeStyle = "rgba(255,255,255,0.05)";
            const ydWidth = w / 20; // Show 20 yards in view
            for(let i=0; i<w; i+=ydWidth) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke();
            }
            
            // LOS
            ctx.strokeStyle = "#fbbf24"; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(w/2, 0); ctx.lineTo(w/2, h); ctx.stroke();

            // Basic Player Positions (Static for now)
            const centerX = w/2;
            const centerY = h/2;
            for(let i=0; i<5; i++) drawPlayer(centerX - 30, (centerY - 70) + (i*35), "#3b82f6", true);
            drawPlayer(centerX - 70, centerY, "#3b82f6", true);
            
            for(let i=0; i<4; i++) drawPlayer(centerX + 30, (centerY - 55) + (i*35), "#ef4444", false);
            
            requestAnimationFrame(draw);
        }

        setPersonnel('balanced');
        draw();
        updateUI();
    </script>
</body>
</html>
